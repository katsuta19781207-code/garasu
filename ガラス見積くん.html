<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strategic Estimator (2026.03 Revised)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
  :root { --bg: #0d0f14; --surface: #161920; --surface2: #1e2230; --border: #2a2f3e; --accent: #4fc3f7; --accent2: #00e676; --warn: #ff9800; --danger: #f44336; --text: #e8eaf0; --muted: #6b7280; --maker_h: #4fc3f7; --maker_b: #a78bfa; --optimal: #00e676; --acceptable: #29b6f6; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); padding: 24px 16px; }
  .header { text-align: center; margin-bottom: 24px; }
  .header h1 { font-size: 20px; font-weight: 900; color: var(--accent); letter-spacing: 0.1em; }
  .header p { color: var(--accent2); font-size: 12px; font-weight: 700; margin-top: 4px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin: 0 auto 16px; max-width: 900px; }
  .card-title { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;}
  .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
  .input-group { display: flex; flex-direction: column; gap: 4px; }
  label { font-size: 11px; font-weight: 700; color: var(--muted); }
  input, select { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 8px 12px; font-family: 'JetBrains Mono', monospace; font-size: 14px; outline: none; }
  .btn-calc { width: 100%; padding: 14px; background: var(--accent); color: #000; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; margin-top: 16px; transition: opacity 0.2s; font-family: 'Noto Sans JP', sans-serif; font-size: 14px; }
  .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 600px) { .result-grid { grid-template-columns: 1fr; } }
  .company-card { background: var(--surface2); border-radius: 10px; padding: 16px; border: 2px solid transparent; }
  .price-main { font-family: 'JetBrains Mono', monospace; font-size: 26px; font-weight: 700; margin: 4px 0; }
  .breakdown-section { margin-top: 12px; padding-top: 12px; border-top: 1px dashed var(--border); }
  .breakdown-row { display: flex; justify-content: space-between; font-size: 11px; color: var(--text); padding: 3px 0; font-family: 'JetBrains Mono', monospace; }
  /* 歩留まりパネル等は以前のコードと同じスタイルを継承 */
</style>
</head>
<body>

<div class="header">
  <h1>🪟 Strategic Estimator</h1>
  <p>✓ 2026年3月3日 B社最新見積データ反映済</p>
</div>

<div class="card">
  <div class="card-title">⚙️ CONFIGURATION</div>
  <div class="input-grid">
    <div class="input-group"><label>幅 W (mm)</label><input type="number" id="width" value="472"></div>
    <div class="input-group"><label>高さ H (mm)</label><input type="number" id="height" value="445"></div>
    <div class="input-group">
      <label>仕様区分</label>
      <select id="substrate">
        <option value="high_trans" selected>C-714 (高透過)</option>
        <option value="clear">C-190G (普通透明)</option>
      </select>
    </div>
    <div class="input-group"><label>発注枚数 (Lot)</label><input type="number" id="qty" value="1"></div>
  </div>
  <div class="revision-box" style="margin-top:15px; padding:10px; border:1px solid var(--danger); background:rgba(244,67,54,0.1); border-radius:6px;">
    <label style="color:var(--danger); font-size:12px; font-weight:bold;">
      <input type="checkbox" id="maker_hRevision"> 📈 H社 2026年3月価格改定 (+10%) を適用
    </label>
  </div>
  <button class="btn-calc" onclick="calculate()">▶ 最新単価で計算</button>
</div>

<div class="card" id="result-section" style="display:none;">
  <div class="card-title">💰 OUTPUT RESULT</div>
  <div class="result-grid" id="result-grid"></div>
</div>

<script>
// ===============================
// 最新見積データ反映 (2026/03/03 坂東ベース)
// ===============================
const MASTER = {
  maker_h: { 
    fixed: 700, 
    sub: { high_trans: 11500, clear: 8500 } // H社予測単価
  },
  maker_b: { 
    fixed: 0, 
    // 見積書から面積単価を逆算：2,200円 / (0.472*0.445) ≒ 10,474円
    sub: { high_trans: 10474, clear: 7665 } 
  }
};

function calculate() {
  const w = parseInt(document.getElementById('width').value) || 0;
  const h = parseInt(document.getElementById('height').value) || 0;
  const qty = parseInt(document.getElementById('qty').value) || 1;
  const subKey = document.getElementById('substrate').value;
  const applyRevision = document.getElementById('maker_hRevision').checked;

  const results = ['maker_h', 'maker_b'].map(m => {
    const config = MASTER[m];
    const area = (w * h) / 1000000;
    
    let basePrice = area * config.sub[subKey] + config.fixed;
    
    // H社改定
    if (m === 'maker_h' && applyRevision) {
      basePrice *= 1.10;
    }

    const finalPrice = Math.round(basePrice / 10) * 10;
    return { id: m, price: finalPrice, area: area };
  });

  const section = document.getElementById('result-section');
  section.style.display = 'block';
  const grid = document.getElementById('result-grid');
  
  grid.innerHTML = results.map(r => `
    <div class="company-card" style="border-color:${r.id === 'maker_b' ? 'var(--maker_b)' : 'var(--maker_h)'}">
      <div style="color:var(--muted); font-size:12px;">${r.id === 'maker_h' ? 'H社' : 'B社'}</div>
      <div class="price-main">¥${r.price.toLocaleString()}</div>
      <div class="breakdown-section">
        <div class="breakdown-row"><span>面積</span><span>${r.area.toFixed(4)} ㎡</span></div>
        <div class="breakdown-row"><span>小計</span><span>¥${(r.price * qty).toLocaleString()}</span></div>
      </div>
    </div>
  `).join('');
}
</script>
</body>
</html>
